name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run test suite
        run: cargo test --locked

  create_release:
    name: Ensure release exists
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true

  build:
    name: Build ${{ matrix.label }}
    needs:
      - test
      - create_release
    if: >-
      ${{
        always() &&
        needs.test.result == 'success' &&
        (needs.create_release.result == 'success' || needs.create_release.result == 'skipped')
      }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-amd64
            runner: macos-latest
            target: x86_64-apple-darwin
            binary_name: tccli-rs
            asset_name: tccli-rs-darwin-amd64.tar.gz
            use_cross: false
          - label: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary_name: tccli-rs
            asset_name: tccli-rs-darwin-arm64.tar.gz
            use_cross: false
          - label: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: tccli-rs
            asset_name: tccli-rs-linux-amd64.tar.gz
            use_cross: true
          - label: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: tccli-rs
            asset_name: tccli-rs-linux-arm64.tar.gz
            use_cross: true
          - label: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: tccli-rs.exe
            asset_name: tccli-rs-windows-amd64.zip
            use_cross: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build binary with cross
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.asset_name }}" "${{ matrix.binary_name }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $binary = Join-Path -Path "target\${{ matrix.target }}\release" -ChildPath "${{ matrix.binary_name }}"
          $archive = Join-Path -Path "dist" -ChildPath "${{ matrix.asset_name }}"
          Compress-Archive -Path $binary -DestinationPath $archive -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/${{ matrix.asset_name }}
          fail_on_unmatched_files: true
          overwrite_files: true
